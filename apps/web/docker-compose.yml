services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      GARAGE_ENDPOINT_URL: ${GARAGE_ENDPOINT_URL}
      GARAGE_REGION: ${GARAGE_REGION}
      GARAGE_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY_ID}
      GARAGE_SECRET_ACCESS_KEY: ${GARAGE_SECRET_ACCESS_KEY}
      GARAGE_BUCKET: ${GARAGE_BUCKET}
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: [
          "CMD",
          "bun",
          "-e",
          "await fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 :
          1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
